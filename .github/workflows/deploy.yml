name: Deploy frontend to alpha

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required to assume the AWS role via OIDC
  contents: read

concurrency:
  group: deploy-alpha
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  BUCKET: mando-frontend-alpha
  DISTRIBUTION_ID: E3GL1INW3LTW1E

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # HTML/JS/CSS are served with no-cache so browsers always pick up new
      # deploys (the bucket sends no cache headers otherwise, and browsers
      # heuristically cache them). Other assets keep default caching.
      - name: Sync code files (no-cache)
        run: |
          aws s3 sync . "s3://$BUCKET" --delete \
            --exclude "*" \
            --include "*.html" --include "*.js" --include "*.css" \
            --exclude "templates/*" --exclude "documentation/*" \
            --cache-control "no-cache"

      - name: Sync remaining assets (default caching)
        run: |
          aws s3 sync . "s3://$BUCKET" \
            --exclude ".git/*" --exclude ".github/*" --exclude ".idea/*" \
            --exclude ".ai/*" --exclude "templates/*" --exclude "documentation/*" \
            --exclude "node_modules/*" --exclude "*.md" --exclude ".DS_Store" \
            --exclude "package*.json" --exclude "*.html" --exclude "*.js" --exclude "*.css"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" --paths "/*"
