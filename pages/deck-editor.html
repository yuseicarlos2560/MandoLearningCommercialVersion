<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Deck Editor | MandoLearning</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Noto+Serif+SC:wght@500;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../js/tailwind-config.js"></script>
<link rel="stylesheet" href="../css/design-system.css" />
<!-- Shared utilities, shell, and UI components -->
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/shell.js"></script>
<script src="../js/ui-components.js"></script>
<script src="../js/pinyin-helper.js"></script>
<!-- API clients -->
<script src="../js/api/client.js"></script>
<script src="../js/api/flashcards.js"></script>
<script src="../js/api/batch.js"></script>
</head>
<body class="bg-background text-on-background font-body-md overflow-x-hidden">
<!-- Cultural Background Pattern -->
<div class="fixed inset-0 seigaiha-pattern pointer-events-none z-0"></div>
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 right-0 header-with-sidebar z-30 glass-nav bg-surface/90 border-b border-outline-variant">
<div class="flex justify-between items-center w-full px-lg py-md max-w-[1200px] mx-auto">
<div class="flex items-center gap-md">
<button id="mobile-menu-toggle" class="md:hidden p-2 rounded-lg hover:bg-surface-container transition-colors text-on-surface" aria-label="Open menu">
<span class="material-symbols-outlined">menu</span>
</button>
<a class="text-headline-md font-headline-md font-bold text-primary" href="../index.html">MandoLearning</a>
</div>
<div class="flex items-center gap-md">
<div class="relative hidden sm:block">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">search</span>
<input id="card-search-input" class="bg-surface-container-low border-none rounded-full pl-10 pr-4 py-2 text-sm w-56 focus:ring-2 focus:ring-primary/20 placeholder:text-outline" placeholder="Search cards..." type="text"/>
</div>
<button id="study-now-btn" class="bg-primary-container text-on-primary-container px-6 py-2 rounded-full font-label-caps text-label-caps font-bold hover:brightness-105 transition-all active:scale-95">
Study Now
</button>
<div class="w-10 h-10 rounded-full object-cover ring-2 ring-primary-container overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDsrRoKkSh1mdiUmCO2UMQiBGx1DJu4tptOsAcEaRvhjQkafyyHlpb2W-HJoPLRss6aqK5JeJgeM0MOGyR-Pt0KlBFiv_QHmenxt6GLq5RLKe0mhuF4GSoIml5Ua7U9b9gWXvB3x1KME_I0iBPdTt0P-21xqCnPTi002fxbMP_Bq5m2Mb2nZ5C140B4sB2Wt9swpvpAvpGbayrVcbf3ESQncRkOHlVe6MWP30mVrYl4qH-XL5-zSpf8wkJUbzrQenxf028edm9V6gU"/>
</div>
</div>
</div>
</header>
<!-- Mobile drawer overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-[55] hidden md:hidden"></div>
<!-- Side Navigation Bar -->
<aside id="sidebar" class="sidebar w-[280px] h-screen fixed left-0 top-0 bg-surface-container dark:bg-surface-container-high flex flex-col py-md px-base z-40 -translate-x-full md:translate-x-0 transition-transform duration-300"></aside>
<script>
  if (window.MandoAuth) {
    window.MandoAuth.guard('pages');
  }
  if (window.MandoShell) {
    window.MandoShell.renderSidebar({ pageRoot: 'pages', activeNavItem: 'flashcards' });
  }
</script>
<!-- Main Content Area -->
<main class="pt-[88px] min-h-screen main-with-sidebar transition-all duration-300 relative z-10">
<div class="px-lg py-md max-w-[1200px] mx-auto space-y-lg">
<!-- My Decks Section -->
<section>
<div class="flex justify-between items-end mb-md">
<div>
<h1 class="font-headline-md text-headline-md text-on-surface">My Decks</h1>
<p class="text-on-surface-variant">Select a deck to manage its cards</p>
</div>
</div>
<div id="deck-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-md"></div>
</section>
<!-- Card Editor Section -->
<section class="bg-surface-container-lowest/80 backdrop-blur-md border border-outline-variant rounded-2xl overflow-hidden shadow-sm">
<div class="px-md py-6 border-b border-outline-variant flex flex-col sm:flex-row justify-between items-center gap-4">
<div class="flex items-center gap-4">
<div class="bg-primary-container text-on-primary-container p-2 rounded-lg">
<span class="material-symbols-outlined">edit_square</span>
</div>
<div>
<h3 class="font-headline-md text-lg text-on-surface">Card Editor</h3>
<p class="text-label-caps text-on-surface-variant">Managing: <span id="active-deck-name">Miscellaneous</span> <span id="active-deck-badge" class="ml-xs bg-surface-container-highest text-on-surface-variant text-[10px] px-2 py-0.5 rounded-full font-bold uppercase hidden"></span></p>
</div>
</div>
<div class="flex items-center gap-3">
<button id="save-all-btn" class="relative flex items-center gap-2 px-5 py-2.5 border border-primary text-primary rounded-full font-label-caps text-label-caps font-bold hover:bg-primary-container/10 active:scale-95 transition-all disabled:opacity-40 disabled:pointer-events-none" disabled>
<span class="material-symbols-outlined text-lg">save</span>
Save All
<span id="pending-badge" class="hidden absolute -top-2 -right-2 min-w-[20px] h-5 px-1 bg-error text-on-error text-[10px] font-bold rounded-full items-center justify-center">0</span>
</button>
<button id="add-card-btn" class="flex items-center gap-2 px-5 py-2.5 bg-primary text-on-primary rounded-full font-label-caps text-label-caps font-bold shadow-sm hover:brightness-110 active:scale-95 transition-all">
<span class="material-symbols-outlined text-lg">add</span>
Add Card
</button>
</div>
</div>
<!-- Card List Table -->
<div class="overflow-x-auto">
<table class="w-full text-left border-collapse">
<thead class="bg-surface-container/50 text-label-caps text-on-surface-variant border-b border-outline-variant">
<tr>
<th class="px-md py-4 font-semibold">Chinese</th>
<th class="px-md py-4 font-semibold">Pinyin</th>
<th class="px-md py-4 font-semibold">English</th>
<th class="px-md py-4 font-semibold">Status</th>
<th class="px-md py-4 font-semibold text-right">Actions</th>
</tr>
</thead>
<tbody id="card-table-body" class="divide-y divide-outline-variant/30"><!-- rendered by JS --></tbody>
</table>
</div>
<!-- Pagination/Load More Footer -->
<div class="px-md py-4 border-t border-outline-variant bg-surface-container-lowest/50 flex justify-between items-center">
<p id="showing-count" class="text-label-caps text-on-surface-variant">Showing 0 cards</p>
<button id="load-more-btn" class="flex items-center gap-xs px-md py-2 border border-outline-variant text-on-surface-variant text-sm font-bold rounded-full hover:bg-surface-container-high hover:text-on-surface transition-all disabled:opacity-40 disabled:pointer-events-none" disabled>
Load More
<span class="material-symbols-outlined text-[18px]">chevron_right</span>
</button>
</div>
</section>
</div>
</main>
<!-- Add / Edit Card Modal -->
<div id="card-modal" class="fixed inset-0 z-[60] bg-black/40 backdrop-blur-sm items-center justify-center p-md hidden">
<div class="bg-surface rounded-3xl shadow-2xl w-full max-w-md p-lg border border-outline-variant" role="dialog" aria-modal="true" aria-labelledby="card-modal-title">
<div class="flex items-center gap-sm mb-md">
<span class="material-symbols-outlined text-primary text-2xl">edit_note</span>
<h3 id="card-modal-title" class="font-headline-md text-headline-md text-on-surface">Add Card</h3>
</div>
<form id="card-form" class="space-y-md">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-xs" for="card-field-character">Chinese <span class="text-primary">*</span></label>
<input id="card-field-character" class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-sm py-xs font-character-display text-xl text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none" placeholder="e.g. 合作" type="text" maxlength="25" required/>
</div>
<div class="grid grid-cols-2 gap-sm">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-xs" for="card-field-pinyin">Pinyin <span class="text-on-surface-variant/70 normal-case">(auto-filled)</span></label>
<input id="card-field-pinyin" class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-sm py-xs text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none" placeholder="Auto-filled from the character" type="text" maxlength="250"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-xs" for="card-field-hsk">HSK Level <span class="text-primary">*</span></label>
<select id="card-field-hsk" class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-sm py-xs text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none">
<option value="HSK1">HSK 1</option>
<option value="HSK2">HSK 2</option>
<option value="HSK3">HSK 3</option>
<option value="HSK4" selected>HSK 4</option>
<option value="HSK5">HSK 5</option>
<option value="HSK6">HSK 6</option>
</select>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-xs" for="card-field-meaning">English Meaning</label>
<input id="card-field-meaning" class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-sm py-xs text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none" placeholder="e.g. to cooperate; collaboration" type="text" maxlength="150"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-xs" for="card-field-category">Deck</label>
<select id="card-field-category" class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-sm py-xs text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none"></select>
<p id="category-change-hint" class="text-xs text-on-surface-variant mt-xs hidden">Moving a card to another deck requires recreating it.</p>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-xs" for="card-field-tags">Tags <span class="text-on-surface-variant/70 normal-case">(optional, comma-separated)</span></label>
<input id="card-field-tags" class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-sm py-xs text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none" placeholder="e.g. business,formal" type="text"/>
</div>
<p id="card-form-error" class="text-error text-sm hidden"></p>
<div class="flex justify-end gap-sm pt-sm">
<button type="button" id="card-form-cancel" class="px-md py-xs rounded-lg border border-outline-variant text-on-surface font-body-md hover:bg-surface-container transition-all">Cancel</button>
<button type="submit" id="card-form-submit" class="px-md py-xs rounded-lg bg-primary text-on-primary font-body-md hover:bg-primary-dim transition-all shadow-md">Add Card</button>
</div>
</form>
</div>
</div>
<script src="../js/pages/deck-editor.js"></script>
</body>
</html>
