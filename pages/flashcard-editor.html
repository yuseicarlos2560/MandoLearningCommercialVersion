<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MandoLearning | Flashcard Editor</title>

    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@500;700&display=swap" />

    <!-- Tailwind Config (must load BEFORE the CDN) -->
    <script src="../js/tailwind-config.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Custom Design System CSS -->
    <link rel="stylesheet" href="../css/design-system.css" />

    <!-- Shared Layout Shell (must load before main.js) -->
    <script type="module" src="../js/shell.js"></script>
</head>
<body class="bg-background text-on-background font-body-md overflow-x-hidden">

    <!-- ============================================================ -->
    <!-- MAIN CONTENT                                                  -->
    <!-- ============================================================ -->
    <main class="min-h-screen transition-all duration-300">
        <div class="px-margin-desktop max-w-max-width py-md">

            <!-- Breadcrumbs -->
            <div class="flex items-center gap-xs mb-md text-on-surface-variant">
                <span class="font-label-caps text-label-caps">Dashboard</span>
                <span class="material-symbols-outlined text-[14px]">chevron_right</span>
                <a href="deck-browser.html" class="font-label-caps text-label-caps hover:text-primary">Flashcards</a>
                <span class="material-symbols-outlined text-[14px]">chevron_right</span>
                <span class="font-label-caps text-label-caps text-primary">Editor</span>
            </div>

            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-lg gap-md">
                <div>
                    <h2 class="font-headline-lg text-headline-lg text-primary">Flashcard Editor</h2>
                    <p class="text-on-surface-variant text-body-lg mt-xs">Create new cards and save them to your deck.</p>
                </div>
                <div class="flex items-center gap-sm">
                    <button class="flex items-center gap-xs px-md py-xs bg-primary text-on-primary rounded-lg font-body-md hover:bg-primary-dim transition-all shadow-md" id="btn-save-all">
                        <span class="material-symbols-outlined text-sm">save</span>
                        Save Cards
                        <span class="hidden px-sm py-xs bg-on-primary text-primary rounded-full text-xs font-bold" id="pending-badge">0</span>
                    </button>
                </div>
            </div>

            <!-- Editor Form -->
            <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md mb-lg">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-md mb-md">
                    <div>
                        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Character *</label>
                        <input type="text" id="edit-character" maxlength="25" class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-character-display text-on-surface" placeholder="汉字" />
                    </div>
                    <div>
                        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Pinyin</label>
                        <input type="text" id="edit-pinyin" maxlength="250" class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface" placeholder="hàn zì" />
                    </div>
                    <div>
                        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Meaning</label>
                        <input type="text" id="edit-meaning" maxlength="150" class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface" placeholder="Chinese character" />
                    </div>
                    <div>
                        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">HSK Level *</label>
                        <select id="edit-hsk" class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface">
                            <option value="HSK1">HSK 1</option>
                            <option value="HSK2">HSK 2</option>
                            <option value="HSK3">HSK 3</option>
                            <option value="HSK4">HSK 4</option>
                            <option value="HSK5">HSK 5</option>
                            <option value="HSK6">HSK 6</option>
                        </select>
                    </div>
                    <div>
                        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Category *</label>
                        <select id="edit-category" class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface">
                            <option value="VERBS">Verbs</option>
                            <option value="NOUNS">Nouns</option>
                            <option value="ADJECTIVES">Adjectives</option>
                            <option value="TRAVEL">Travel</option>
                            <option value="BUSINESS">Business</option>
                            <option value="DAILY">Daily Life</option>
                            <option value="MISCELLANEOUS">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Tags</label>
                        <input type="text" id="edit-tags" maxlength="100" class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface" placeholder="common,daily" />
                    </div>
                </div>
                <div class="flex gap-sm">
                    <button class="flex-1 bg-secondary text-on-secondary py-sm rounded-lg font-label-caps text-label-caps font-bold hover:bg-secondary-dim transition-all active:scale-95" id="btn-add-card">
                        <span class="material-symbols-outlined text-sm">add</span>
                        Add to Queue
                    </button>
                    <button class="px-md py-sm border border-outline-variant text-on-surface-variant rounded-lg hover:bg-surface-container transition-all" id="btn-clear-form" title="Clear form">
                        <span class="material-symbols-outlined">clear</span>
                    </button>
                </div>
            </div>

            <!-- Queued Cards -->
            <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md">
                <div class="flex justify-between items-center mb-md">
                    <h3 class="font-headline-md text-headline-md text-on-surface">Queued Cards</h3>
                    <span class="text-on-surface-variant text-sm" id="queue-count">0 cards queued</span>
                </div>
                <div id="queued-cards-list" class="space-y-sm">
                    <p class="text-center text-on-surface-variant py-md" id="queue-empty">No cards queued yet. Fill the form above and click Add to Queue.</p>
                </div>
            </div>

        </div>
    </main>

    <!-- ============================================================ -->
    <!-- SCRIPTS                                                       -->
    <!-- ============================================================ -->
    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/pages/flashcard-editor.js"></script>
</body>
</html>
