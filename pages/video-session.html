<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MandoLearning — Video Session</title>

    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@500;700&display=swap" />

    <!-- Tailwind Config (must load BEFORE the CDN) -->
    <script src="../js/tailwind-config.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Custom Design System CSS -->
    <link rel="stylesheet" href="../css/design-system.css" />

    <!-- Shared Layout Shell (must load before main.js) -->
    <script type="module" src="../js/shell.js"></script>
</head>
<body class="text-on-surface overflow-x-hidden">

    <!-- ============================================================ -->
    <!-- MAIN CONTENT                                                  -->
    <!-- ============================================================ -->
    <main class="min-h-screen transition-all duration-300 overflow-visible">
        <div class="px-margin-desktop max-w-max-width py-md overflow-visible">

            <!-- Breadcrumbs -->
            <div class="flex items-center gap-xs mb-md text-on-surface-variant">
                <span class="font-label-caps text-label-caps">Dashboard</span>
                <span class="material-symbols-outlined text-[14px]">chevron_right</span>
                <span class="font-label-caps text-label-caps">HSK3</span>
                <span class="material-symbols-outlined text-[14px]">chevron_right</span>
                <span class="font-label-caps text-label-caps text-primary" id="breadcrumb-session">Class Review</span>
            </div>

            <!-- Bento Grid Layout -->
            <div class="grid grid-cols-12 gap-md w-full overflow-visible">

                <!-- ==================================================== -->
                <!-- LEFT COLUMN: Video + Notes (col-span-8)             -->
                <!-- ==================================================== -->
                <div class="col-span-12 lg:col-span-8 flex flex-col gap-gutter">

                    <!-- Video Player -->
                    <div class="relative aspect-video rounded-3xl overflow-hidden shadow-xl bg-black group" id="video-container">
                        <video id="main-video" class="w-full h-full object-cover" controls preload="metadata">
                            <!-- Video source will be set dynamically -->
                            <track kind="subtitles" src="" srclang="zh" label="Chinese" default />
                        </video>
                        <!-- Subtitle Overlay (synced with video time) -->
                        <div class="absolute bottom-md left-1/2 -translate-x-1/2 w-[90%] max-w-[90%] bg-surface/90 backdrop-blur-md px-md py-sm rounded-2xl border border-outline-variant shadow-lg text-center z-10 pointer-events-none" id="subtitle-overlay">
                            <p class="font-character-display text-[32px] leading-relaxed text-on-surface" id="subtitle-character">Loading video...</p>
                            <p class="font-body-md text-on-surface-variant mt-xs italic" id="subtitle-pinyin"></p>
                        </div>
                    </div>

                    <!-- Save Word Bar (appears when text is selected in subtitles) -->
                    <div class="hidden flex items-center justify-between px-md py-sm bg-primary-container rounded-xl border border-primary" id="save-word-bar">
                        <div class="flex items-center gap-sm">
                            <span class="material-symbols-outlined text-primary">text_select</span>
                            <span class="font-body-md text-on-primary-container">Selected: <strong id="selected-text">—</strong></span>
                        </div>
                        <div class="flex items-center gap-sm">
                            <label class="flex items-center gap-xs text-sm text-on-primary-container cursor-pointer">
                                <input type="checkbox" id="chk-add-to-deck" class="rounded border-outline" />
                                Also add to deck
                            </label>
                            <button class="flex items-center gap-xs px-md py-xs bg-primary text-on-primary rounded-lg font-body-md hover:bg-primary-dim transition-all shadow-md" id="btn-save-word">
                                <span class="material-symbols-outlined text-sm">add</span>
                                Save Word
                            </button>
                        </div>
                    </div>

                    <!-- Hierarchical Notes System -->
                    <div class="bg-surface-container-lowest rounded-3xl p-lg card-elevation-1 overflow-visible relative">
                        <!-- Notes Header -->
                        <div class="flex items-center justify-between mb-lg">
                            <div class="flex items-center gap-sm">
                                <span class="material-symbols-outlined text-primary">sticky_note_2</span>
                                <h3 class="font-headline-md text-headline-md text-on-surface">Topic Notes</h3>
                                <span class="hidden px-sm py-xs bg-secondary-container text-on-secondary-container rounded-full font-label-caps text-label-caps" id="pending-badge">0</span>
                            </div>
                            <div class="flex items-center gap-sm">
                                <button class="flex items-center gap-xs px-md py-xs bg-surface-container-high text-on-surface rounded-lg font-body-md hover:bg-surface-dim transition-all border border-outline-variant" id="btn-new-note">
                                    <span class="material-symbols-outlined text-sm">add</span>
                                    New Note
                                </button>
                                <button class="flex items-center gap-xs px-md py-xs bg-primary text-on-primary rounded-lg font-body-md hover:bg-primary-dim transition-all shadow-md" id="btn-save-all">
                                    <span class="material-symbols-outlined text-sm">save</span>
                                    Save (Ctrl+S)
                                </button>
                            </div>
                        </div>

                        <!-- Empty State -->
                        <div class="text-center py-xl" id="notes-empty-state">
                            <span class="material-symbols-outlined text-[48px] text-outline-variant mb-sm">note_stack</span>
                            <p class="font-body-md text-on-surface-variant">No notes yet. Select a word from the subtitles and click "Save Word".</p>
                        </div>

                        <!-- Notes List (dynamically rendered) -->
                        <div class="space-y-md overflow-visible hidden" id="notes-list"></div>
                    </div>
                </div>

                <!-- ==================================================== -->
                <!-- RIGHT COLUMN: Script Panel (col-span-4)               -->
                <!-- ==================================================== -->
                <div class="col-span-12 lg:col-span-4 flex flex-col gap-gutter">
                    <div class="bg-surface-container-low rounded-3xl p-md h-full flex flex-col border border-outline-variant">
                        <div class="flex items-center justify-between mb-md">
                            <h3 class="font-headline-md text-headline-md text-on-surface">Full Script</h3>
                            <div class="flex gap-xs">
                                <button class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-xs" id="script-toggle-zh">中</button>
                                <button class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-bold text-xs" id="script-toggle-py">ǎ</button>
                                <button class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-bold text-xs" id="script-toggle-en">EN</button>
                            </div>
                        </div>
                        <div class="flex-1 overflow-y-auto pr-sm custom-scrollbar space-y-md" id="script-content">
                            <!-- Script lines rendered dynamically -->
                        </div>
                        <div class="mt-md pt-md border-t border-outline-variant">
                            <div class="w-full h-1.5 bg-surface-container-highest rounded-full mt-xs overflow-hidden">
                                <div class="h-full bg-primary w-[0%] transition-all duration-1000" id="script-progress"></div>
                            </div>
                            <div class="mt-xs text-right">
                                <span class="font-label-caps text-label-caps text-primary" id="script-progress-text">0% Complete</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- ==================================================== -->
            <!-- RELATED LESSONS                                         -->
            <!-- ==================================================== -->
            <section class="mt-xl">
                <h3 class="font-headline-md text-headline-md text-on-surface mb-lg">Related Lessons</h3>
                <div class="flex gap-md overflow-x-auto pb-md custom-scrollbar" id="related-lessons">
                    <!-- Rendered dynamically -->
                </div>
            </section>

        </div>
    </main>

    <!-- ============================================================ -->
    <!-- TEMPLATES                                                     -->
    <!-- ============================================================ -->

    <!-- Parent Note Template -->
    <template id="tpl-parent-note">
        <div class="rounded-2xl border border-outline-variant overflow-visible group note-parent" data-note-id="">
            <!-- Parent Header -->
            <div class="bg-surface p-lg flex justify-between items-center border-b border-outline-variant rounded-t-2xl overflow-visible relative">
                <!-- Hover Actions -->
                <div class="flex items-center gap-xs absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity note-hover-actions">
                    <button class="p-xs hover:bg-error-container hover:text-on-error-container rounded-full transition-colors btn-delete-note" title="Delete">
                        <span class="material-symbols-outlined text-sm">delete</span>
                    </button>
                    <button class="p-xs hover:bg-secondary-container hover:text-on-secondary-container rounded-full transition-colors btn-add-child" title="Add child note">
                        <span class="material-symbols-outlined text-sm">add_circle</span>
                    </button>
                </div>
                <!-- Note Title -->
                <div class="flex flex-col note-title-container">
                    <span class="font-character-display text-headline-md text-on-surface note-character" contenteditable="false">—</span>
                    <span class="font-label-caps text-label-caps text-on-surface-variant note-pinyin">—</span>
                </div>
                <!-- Details Button -->
                <div class="relative">
                    <button class="px-md py-sm bg-surface-container-high hover:bg-surface-dim text-on-surface rounded-lg font-label-caps text-label-caps transition-colors border border-outline-variant btn-details">
                        Details
                    </button>
                </div>
            </div>
            <!-- Children Notes Container -->
            <div class="bg-surface-container-low p-md space-y-sm rounded-b-2xl note-children"></div>
        </div>
    </template>

    <!-- Child Note Template -->
    <template id="tpl-child-note">
        <div class="flex items-center justify-between p-sm rounded-xl hover:bg-surface-container-high transition-colors group cursor-pointer note-child" data-note-id="">
            <div class="flex items-center gap-md">
                <span class="material-symbols-outlined text-outline text-sm">subdirectory_arrow_right</span>
                <div>
                    <span class="font-character-display text-lg text-on-surface note-character" contenteditable="false">—</span>
                    <span class="text-xs text-on-surface-variant ml-sm note-pinyin">—</span>
                </div>
            </div>
            <div class="flex items-center gap-xs">
                <button class="material-symbols-outlined text-outline hover:text-error transition-colors text-sm btn-delete-note" title="Delete">delete</button>
                <button class="material-symbols-outlined text-outline group-hover:text-primary transition-colors text-sm btn-edit-note" title="Edit">edit</button>
            </div>
        </div>
    </template>

    <!-- Detail Popover Template (rendered inside modal) -->
    <template id="tpl-detail-modal">
        <div class="space-y-sm">
            <div class="flex justify-between items-start mb-sm">
                <div class="flex flex-col">
                    <span class="font-character-display text-headline-md text-primary detail-character">—</span>
                    <span class="font-body-md text-on-surface-variant detail-pinyin">—</span>
                </div>
            </div>
            <div class="space-y-sm">
                <div>
                    <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Example Sentence</label>
                    <textarea class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface resize-none" rows="2" placeholder="Enter an example sentence..." id="detail-example"></textarea>
                </div>
                <div>
                    <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Explanation</label>
                    <textarea class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface resize-none" rows="4" placeholder="Enter detailed explanation..." id="detail-explanation"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-sm pt-sm border-t border-outline-variant mt-sm">
                <button class="flex items-center gap-xs text-xs text-on-surface-variant hover:text-error transition-colors btn-delete-detail">
                    <span class="material-symbols-outlined text-sm">delete</span>
                    Delete
                </button>
                <button class="flex items-center gap-xs text-xs text-primary font-bold hover:text-primary-dim transition-colors btn-update-detail">
                    <span class="material-symbols-outlined text-sm">edit</span>
                    Update
                </button>
            </div>
        </div>
    </template>

    <!-- New Note Modal Content Template -->
    <template id="tpl-new-note-form">
        <div class="space-y-md">
            <div>
                <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Character *</label>
                <input type="text" class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-character-display text-on-surface" placeholder="e.g., 面试" id="new-note-character" maxlength="25" />
            </div>
            <div>
                <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Pinyin</label>
                <input type="text" class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface" placeholder="e.g., miànshì" id="new-note-pinyin" maxlength="250" />
            </div>
            <div>
                <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">HSK Level *</label>
                <select class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface" id="new-note-hsk">
                    <option value="HSK1">HSK 1</option>
                    <option value="HSK2">HSK 2</option>
                    <option value="HSK3" selected>HSK 3</option>
                    <option value="HSK4">HSK 4</option>
                    <option value="HSK5">HSK 5</option>
                    <option value="HSK6">HSK 6</option>
                </select>
            </div>
            <div>
                <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Parent Note (optional)</label>
                <select class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface" id="new-note-parent">
                    <option value="">— None (root note) —</option>
                </select>
            </div>
            <div class="flex items-center gap-xs">
                <input type="checkbox" id="new-note-add-to-deck" class="rounded border-outline" />
                <label for="new-note-add-to-deck" class="text-sm text-on-surface font-body-md">Also add to my flashcard deck</label>
            </div>
            <div class="hidden" id="new-note-deck-fields">
                <div>
                    <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Meaning</label>
                    <input type="text" class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface" placeholder="e.g., Job Interview" id="new-note-meaning" maxlength="150" />
                </div>
                <div>
                    <label class="font-label-caps text-label-caps text-on-surface-variant block mb-xs">Category</label>
                    <select class="w-full p-sm bg-surface-container-low rounded-lg border border-outline-variant text-sm font-body-md text-on-surface" id="new-note-category">
                        <option value="VERBS">Verbs</option>
                        <option value="NOUNS">Nouns</option>
                        <option value="ADJECTIVES">Adjectives</option>
                        <option value="TRAVEL">Travel</option>
                        <option value="BUSINESS">Business</option>
                        <option value="DAILY">Daily Life</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
            </div>
        </div>
    </template>

    <!-- Script Line Template -->
    <template id="tpl-script-line">
        <div class="p-md rounded-2xl border relative overflow-hidden hover:bg-surface-container-highest border-transparent group script-line" data-time="">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
            <div class="flex gap-sm mb-xs">
                <span class="font-label-caps text-label-caps text-primary script-time">00:00</span>
                <div class="flex items-center gap-xs">
                    <button class="material-symbols-outlined text-sm text-primary hover:scale-110 btn-play-at-time">play_circle</button>
                    <p class="font-body-md font-bold text-on-secondary-container script-text">—</p>
                </div>
            </div>
            <p class="text-sm text-on-secondary-container italic opacity-80 script-translation">—</p>
        </div>
    </template>

    <!-- ============================================================ -->
    <!-- SCRIPTS                                                       -->
    <!-- ============================================================ -->
    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/pages/video-session.js"></script>
</body>
</html>
