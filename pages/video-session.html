<!-- Bento Grid Layout -->
<div class="grid grid-cols-12 gap-md w-full overflow-visible">
<!-- Video Player Container (Column 1-8) -->
<div class="col-span-12 lg:col-span-8 flex flex-col gap-gutter">

<img id="video-unavailable-thumbnail" class="absolute inset-0 w-full h-full object-cover opacity-40" src="" alt="">

<span class="material-symbols-outlined text-5xl text-on-surface-variant">videocam_off</span>
<p class="mt-sm font-headline-md text-headline-md">Video unavailable</p>

</div>
<div id="subtitle-controls" class="absolute top-md right-md z-20 flex items-center gap-xs bg-black/40 backdrop-blur-sm rounded-lg p-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<button id="subtitle-toggle-btn" class="p-1.5 rounded-md text-white hover:bg-white/20 transition-colors" title="Toggle subtitles">
<span class="material-symbols-outlined text-sm">subtitles</span>
</button>
<div class="relative">
<button id="subtitle-size-btn" class="p-1.5 rounded-md text-white hover:bg-white/20 transition-colors" title="Change subtitle size">
<span class="material-symbols-outlined text-sm">text_fields</span>
</button>
<div id="subtitle-size-menu" class="hidden absolute top-full right-0 mt-1 bg-surface rounded-lg shadow-lg border border-outline-variant p-1 min-w-[100px] z-30">
<button data-size="xxs" class="subtitle-size-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded">Extra Small</button>
<button data-size="xs" class="subtitle-size-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded">Small</button>
<button data-size="sm" class="subtitle-size-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded">Medium</button>
<button data-size="md" class="subtitle-size-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded font-semibold">Normal</button>
<button data-size="lg" class="subtitle-size-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded">Large</button>
<button data-size="xl" class="subtitle-size-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded">Extra Large</button>
</div>
</div>

</button>
<div class="relative">
<button id="subtitle-variant-btn" class="p-1.5 rounded-md text-white hover:bg-white/20 transition-colors" title="Chinese variant (Simplified/Traditional)">
<span class="material-symbols-outlined text-sm">translate</span>
</button>
<div id="subtitle-variant-menu" class="hidden absolute top-full right-0 mt-1 bg-surface rounded-lg shadow-lg border border-outline-variant p-1 min-w-[120px] z-30">

<button data-variant="simplified" class="subtitle-variant-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded font-semibold">Simplified</button>
<button data-variant="traditional" class="subtitle-variant-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded">Traditional</button>
</div>
</div>
</div>
<div id="video-custom-controls" class="absolute bottom-0 left-0 right-0 p-md bg-gradient-to-t from-black/60 to-transparent">
<div class="w-full h-1.5 bg-white/30 rounded-full mb-md overflow-hidden relative cursor-pointer" id="video-progress-container">
<div id="video-progress-bar" class="absolute h-full w-[0%] bg-primary transition-all duration-100"></div>
</div>
<div class="flex justify-between items-center text-white">
<div class="flex items-center gap-md">
<button id="video-play-btn" class="material-symbols-outlined hover:scale-110 transition-transform">play_arrow</button>
<span id="video-time" class="font-label-caps text-label-caps">0:00 / 0:00</span>
</div>
<div class="flex items-center gap-md">
<div class="relative">
<button id="video-settings-btn" class="material-symbols-outlined hover:scale-110 transition-transform">settings</button>
<div id="playback-speed-menu" class="hidden absolute bottom-full right-0 mb-2 bg-surface rounded-lg shadow-lg border border-outline-variant p-1 min-w-[100px] z-20">
<button data-rate="0.5" class="speed-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded">0.5x</button>
<button data-rate="0.75" class="speed-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded">0.75x</button>

<button data-rate="1.25" class="speed-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded">1.25x</button>
<button data-rate="1.5" class="speed-option w-full text-left px-sm py-xs text-sm text-on-surface hover:bg-surface-container rounded">1.5x</button>

</div>
<button id="video-fullscreen-btn" class="material-symbols-outlined hover:scale-110 transition-transform">fullscreen</button>
</div>
</div>
</div>

<!-- Hierarchical Notes System -->
<div class="bg-surface-container-lowest rounded-3xl p-md card-elevation-1 overflow-visible relative">
<div class="flex items-center justify-between mb-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary">sticky_note_2</span>
<h3 class="font-headline-md text-headline-md text-on-surface">Topic Notes</h3>
</div>
<div class="flex items-center gap-sm">
<button id="new-note-btn" class="flex items-center gap-xs px-md py-xs bg-surface-container-high text-on-surface rounded-lg font-body-md hover:bg-surface-dim transition-all border border-outline-variant">
<span class="material-symbols-outlined text-sm">add</span> New Note
                            </button>
<button id="save-notes-btn" class="flex items-center gap-xs px-md py-xs bg-primary text-on-primary rounded-lg font-body-md hover:bg-primary-dim transition-all shadow-md">
<span class="material-symbols-outlined text-sm">save</span> Save (Ctrl+S)
                            </button>
</div>
</div>
<div id="notes-container" class="space-y-sm overflow-visible">
<!-- Notes rendered dynamically -->
</div>
</div>
</div>
<!-- Interactive Script (Column 9-12) -->
<div class="col-span-12 lg:col-span-4 flex flex-col gap-gutter">
<div class="bg-surface-container-low rounded-3xl p-md h-full flex flex-col border border-outline-variant">
<div class="flex items-center justify-between mb-md">
<h3 class="font-headline-md text-headline-md text-on-surface">Full Script</h3>
<div class="flex gap-xs">
<button id="script-toggle-zh" class="script-toggle w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-xs" data-mode="zh">中</button>
<button id="script-toggle-py" class="script-toggle w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-bold text-xs" data-mode="py">ǎ</button>
<button id="script-toggle-en" class="script-toggle w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-bold text-xs" data-mode="en">EN</button>
</div>
</div>
<div id="script-container" class="script-panel-fixed overflow-y-auto pr-sm custom-scrollbar space-y-md">
<!-- Script lines rendered dynamically -->
</div>
<div class="mt-md pt-md border-t border-outline-variant">
<div class="w-full h-1.5 bg-surface-container-highest rounded-full mt-xs overflow-hidden">
<div id="script-progress-bar" class="h-full bg-primary w-[0%] transition-all duration-1000"></div>
</div>
<div class="mt-xs text-right"><span id="script-completion-text" class="font-label-caps text-label-caps text-primary">0% Complete</span></div>
</div>
</div>
</div>
</div>
<!-- Related Content Sections -->
<section class="mt-xl">
<h3 class="font-headline-md text-headline-md text-on-surface mb-lg">Related Lessons</h3>
<div id="related-lessons-container" class="flex gap-md overflow-x-auto pb-md custom-scrollbar">
<!-- Related lessons rendered dynamically -->
</div>
</section>
</div>
</main>
<!-- Save Word FAB -->
<button id="fab-save-word" class="hidden fixed bottom-8 right-8 z-40 items-center gap-sm bg-primary text-on-primary px-lg py-md rounded-full shadow-[0_8px_24px_rgba(175,35,48,0.3)] hover:translate-y-[-4px] hover:shadow-[0_12px_32px_rgba(175,35,48,0.4)] transition-all font-bold">
<span class="material-symbols-outlined">edit_note</span>
Save Word
</button>
<!-- Save Word Modal -->
<div id="save-word-modal" class="fixed inset-0 z-[60] bg-black/40 backdrop-blur-sm items-center justify-center p-md hidden">
<div class="bg-surface rounded-3xl shadow-2xl w-full max-w-md p-lg border border-outline-variant" role="dialog" aria-modal="true" aria-labelledby="sw-title">
<div class="flex items-center gap-sm mb-md">
<span class="material-symbols-outlined text-primary text-2xl">edit_note</span>
<h3 id="sw-title" class="font-headline-md text-headline-md text-on-surface">Save Word</h3>
</div>
<form id="sw-form" class="space-y-md">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-xs" for="sw-character">Chinese <span class="text-primary">*</span></label>
<input id="sw-character" class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-sm py-xs font-character-display text-xl text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none" placeholder="e.g. 留学" type="text" maxlength="25" required/>
</div>
<div class="grid grid-cols-2 gap-sm">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-xs" for="sw-pinyin">Pinyin <span class="text-on-surface-variant/70 normal-case">(auto-filled)</span></label>
<input id="sw-pinyin" class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-sm py-xs text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none" placeholder="Auto-filled" type="text" maxlength="250"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-xs" for="sw-hsk">HSK Level <span class="text-primary">*</span></label>
<select id="sw-hsk" class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-sm py-xs text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none">
<option value="HSK1">HSK 1</option>
<option value="HSK2">HSK 2</option>
<option value="HSK3" selected>HSK 3</option>
<option value="HSK4">HSK 4</option>
<option value="HSK5">HSK 5</option>
<option value="HSK6">HSK 6</option>
</select>
</div>
</div>
<div id="sw-deck-fields">
<div class="mb-md">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-xs" for="sw-meaning">English Meaning</label>
<input id="sw-meaning" class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-sm py-xs text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none" placeholder="e.g. to study abroad" type="text" maxlength="150"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-xs" for="sw-category">Deck (for flashcard)</label>
<input id="sw-category" class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-sm py-xs text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none" placeholder="Miscellaneous" type="text" maxlength="50"/>
</div>
</div>
<p id="sw-error" class="text-error text-sm hidden"></p>
<div class="flex justify-end gap-sm pt-sm">
<button type="button" id="sw-cancel" class="px-md py-xs rounded-lg border border-outline-variant text-on-surface font-body-md hover:bg-surface-container transition-all">Cancel</button>
<button type="submit" id="sw-submit" class="px-md py-xs rounded-lg bg-primary text-on-primary font-body-md hover:bg-primary-dim transition-all shadow-md">Save Word</button>
</div>
</form>
</div>
</div>
<script src="../js/pages/video-session.js"></script>
</body>
